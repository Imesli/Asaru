<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Asaru mark: geometric surveillance aperture forming an abstract 'A' -->

  <!-- Outer hexagonal frame -->
  <polygon points="256,56 432,158 432,354 256,456 80,354 80,158"
           stroke="#3b82f6" stroke-width="4" fill="none" opacity="0.15"/>

  <!-- Inner hexagonal frame -->
  <polygon points="256,106 392,183 392,329 256,406 120,329 120,183"
           stroke="#3b82f6" stroke-width="3" fill="none" opacity="0.08"/>

  <!-- The 'A' aperture — two converging lines meeting at a point, with a crossbar -->
  <!-- Left leg -->
  <line x1="160" y1="380" x2="256" y2="120" stroke="#3b82f6" stroke-width="14" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="352" y1="380" x2="256" y2="120" stroke="#3b82f6" stroke-width="14" stroke-linecap="round"/>
  <!-- Crossbar / scan line -->
  <line x1="190" y1="290" x2="322" y2="290" stroke="#3b82f6" stroke-width="8" stroke-linecap="round"/>

  <!-- Apex glow — the "eye" watching -->
  <circle cx="256" cy="120" r="16" fill="#3b82f6" opacity="0.9"/>
  <circle cx="256" cy="120" r="28" fill="#3b82f6" opacity="0.15"/>
  <circle cx="256" cy="120" r="42" fill="#3b82f6" opacity="0.05"/>

  <!-- Scan dots on crossbar — active tracking -->
  <circle cx="218" cy="290" r="5" fill="#34d399"/>
  <circle cx="256" cy="290" r="5" fill="#f59e0b"/>
  <circle cx="294" cy="290" r="5" fill="#ef4444"/>
</svg>
