<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Radar sweep background -->
  <circle cx="256" cy="256" r="200" stroke="rgba(59,130,246,0.08)" stroke-width="1" fill="none"/>
  <circle cx="256" cy="256" r="150" stroke="rgba(59,130,246,0.06)" stroke-width="1" fill="none"/>
  <circle cx="256" cy="256" r="100" stroke="rgba(59,130,246,0.04)" stroke-width="1" fill="none"/>

  <!-- Stylised eye / radar aperture -->
  <!-- Outer eye shape -->
  <path d="M96 256 C96 256 176 140 256 140 C336 140 416 256 416 256 C416 256 336 372 256 372 C176 372 96 256 96 256Z"
        stroke="#3b82f6" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Inner iris -->
  <circle cx="256" cy="256" r="56" stroke="#3b82f6" stroke-width="6" fill="none"/>

  <!-- Pupil / radar dot -->
  <circle cx="256" cy="256" r="20" fill="#3b82f6"/>

  <!-- Radar sweep line -->
  <line x1="256" y1="256" x2="340" y2="180" stroke="#3b82f6" stroke-width="3" opacity="0.6" stroke-linecap="round"/>

  <!-- Detection pings -->
  <circle cx="310" cy="200" r="4" fill="#34d399" opacity="0.9"/>
  <circle cx="350" cy="245" r="3" fill="#f59e0b" opacity="0.7"/>
  <circle cx="195" cy="220" r="3.5" fill="#ef4444" opacity="0.8"/>

  <!-- Crosshair ticks -->
  <line x1="256" y1="140" x2="256" y2="160" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
  <line x1="256" y1="352" x2="256" y2="372" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
  <line x1="96" y1="256" x2="116" y2="256" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
  <line x1="396" y1="256" x2="416" y2="256" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
</svg>
